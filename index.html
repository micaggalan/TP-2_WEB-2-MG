<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">

            <a class="navbar-brand fw-bold" href="#">
                🎸 MisRecis
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="#" id="btnInicio">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#" id="btnRecitales">Recitales</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#" id="btnEstadisticas">Estadísticas</a>
                    </li>
                </ul>

            </div>

        </div>
    </nav>
    <header class="hero">

        <h1>Mi historial de recitales</h1>

        <p>
            Todos los shows que viviste en un solo lugar.
        </p>

    </header>

    <div class="container my-5" id="seccionRecitales">
        <div class="productos"></div>
    </div>
    
    <div class="container my-5 d-none" id="seccionEstadisticas">

    <h2 class="mb-4 text-center">📊 Estadísticas</h2>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card stat-card">
                <div class="card-body text-center">
                    <h6>Recitales</h6>
                    <h2 id="cantRecitales"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card stat-card">
                <div class="card-body text-center">
                    <h6>Total gastado</h6>
                    <h2 id="totalGastado"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card stat-card">
                <div class="card-body text-center">
                    <h6>Promedio</h6>
                    <h2 id="puntajePromedio"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card stat-card">
                <div class="card-body text-center">
                    <h6>Recomendados</h6>
                    <h2 id="cantRecomendados"></h2>
                </div>
            </div>
        </div>

    </div>

</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
